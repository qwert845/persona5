<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System | 페르소나</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Black+Han+Sans&family=Do+Hyeon&family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="transition-wipe" id="transition-wipe"></div>
    <div class="background-rays"></div>
    <div class="halftone-overlay"></div>

    <main class="container">
        <header class="animate-entrance delay-1">
            <h1 class="ransom-note" id="main-title">SYSTEM</h1>
        </header>

        <section class="content-panel animate-entrance delay-2"
            style="justify-content: center; flex-direction: column; align-items: center; gap: 40px; margin-top: 50px;">
            <a href="index.html" class="back-link">돌아가기</a>
            <div class="info-box" style="transform: rotate(-2deg) skewX(-5deg); width: 100%;">
                <div class="alert-box">
                    <div class="alert-label">현재 페이지</div>
                    <div class="alert-title">시스템 (System)</div>
                    <div class="alert-subtitle">데이터 저장 / 불러오기 / 설정</div>
                    <div class="alert-action">시스템 환경설정 진입 중...</div>
                </div>
            </div>
        </section>

        <div class="decorative-star animate-entrance delay-3"
            style="font-size: 15rem; bottom: 10%; right: 10%; top: auto;">★</div>
        <div class="decorative-text animate-entrance delay-4">OPTIONS</div>
    </main>

    <script src="script.js"></script>
</body>

</html>
